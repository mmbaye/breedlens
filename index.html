<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1b5e20">
  <title>BreedLens</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --green:      #1b5e20;
      --green-soft: #2e7d32;
      --green-bg:   #f1f8f2;
      --line:       #e2e8e2;
      --ink:        #14201a;
      --muted:      #5d6b62;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f4f7f4; color: var(--ink);
      -webkit-text-size-adjust: 100%;
    }
    .container { max-width: 820px; margin: 0 auto; padding: 20px 18px 60px; }

    /* Header */
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-soft) 100%);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    h1 { font-size: 21px; font-weight: 650; letter-spacing: -0.3px; }
    h1 .accent { color: var(--green-soft); }
    .subtitle { color: var(--muted); font-size: 13.5px; line-height: 1.5; margin: 8px 0 24px; }

    .lang-btn {
      padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--line); transition: all 0.15s; background: white; color: var(--muted);
    }
    .lang-btn.active { background: var(--green); color: white; border-color: var(--green); }

    /* Upload */
    .upload-zone {
      border: 2px dashed #c2d4c2; border-radius: 16px;
      padding: 44px 20px; text-align: center; cursor: pointer;
      background: white; margin-bottom: 14px; transition: border-color 0.2s;
    }
    .upload-zone:hover { border-color: var(--green-soft); }
    .upload-zone.has-image { padding: 0; overflow: hidden; border-style: solid; border-color: var(--green-soft); }
    .upload-zone img { width: 100%; max-height: 520px; object-fit: contain; border-radius: 14px; display: block; background: #0c120e; }

    /* Capture buttons (mobile-first) */
    .capture-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .capture-btn {
      flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--line);
      background: white; color: var(--ink); font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px;
      transition: all 0.15s;
    }
    .capture-btn:hover { border-color: var(--green-soft); background: var(--green-bg); }
    .capture-btn .ico { font-size: 22px; }

    /* Shooting tips */
    .tips-box {
      background: var(--green-bg); border: 1px solid #d6e8d6; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .tips-title { font-size: 12px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .tips-list { list-style: none; font-size: 12.5px; color: var(--muted); line-height: 1.8; }
    .tips-list li::before { content: "•"; color: var(--green-soft); font-weight: 700; margin-right: 8px; }

    label { font-size: 13px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 4px; }
    textarea {
      width: 100%; padding: 11px 14px; font-size: 15px; border-radius: 10px;
      border: 1px solid var(--line); resize: vertical; min-height: 72px;
      font-family: inherit; margin-bottom: 12px;
    }
    textarea:focus { outline: none; border-color: var(--green-soft); }
    input[type="number"] {
      width: 100%; padding: 9px 12px; font-size: 15px; border-radius: 9px;
      border: 1px solid var(--line); font-family: inherit;
    }
    input[type="number"]:focus { outline: none; border-color: var(--green-soft); }

    button.primary {
      padding: 14px 24px; background: var(--green); color: white;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s; width: 100%;
    }
    button.primary:hover { background: var(--green-soft); }
    button.primary:disabled { background: #b6c4b6; cursor: not-allowed; }

    .result { margin-top: 22px; padding: 18px; background: white; border-radius: 14px; border: 1px solid var(--line); display: none; }
    .result-title { font-size: 13px; font-weight: 600; color: var(--green); margin-bottom: 12px; }
    .result-text { font-size: 14px; line-height: 1.7; }
    .error-text { color: #c62828; font-size: 14px; }
    .loader { display: flex; gap: 5px; padding: 8px 0; justify-content: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #b8c9b8; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    .change-link { text-align: center; font-size: 13px; color: var(--green-soft); cursor: pointer; margin-bottom: 16px; }
    .change-link:hover { text-decoration: underline; }

    .params-box { background: white; border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .params-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .params-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .param-hint { font-size: 11px; color: #9aa89a; margin-top: 3px; }
    .warning-box { background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #795548; margin-top: 12px; }

    .result-text table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .result-text th { background: var(--green-bg); padding: 8px 12px; text-align: left; border: 1px solid var(--line); }
    .result-text td { padding: 8px 12px; border: 1px solid var(--line); }
    .result-text tr:nth-child(even) { background: #f9faf9; }
    .result-text h2 { font-size: 16px; margin: 16px 0 8px; }
    .result-text h3 { font-size: 14px; margin: 12px 0 6px; }
    .result-text code { background: #f3f5f3; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .result-text pre { background: #f3f5f3; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .result-text ul, .result-text ol { padding-left: 20px; margin: 8px 0; }

    @media (max-width: 520px) {
      .params-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header-row">
    <div class="brand">
      <div class="brand-mark">🌾</div>
      <div>
        <h1>Breed<span class="accent">Lens</span></h1>
      </div>
    </div>
    <div style="display:flex; gap:6px;">
      <button class="lang-btn" id="btn-fr" onclick="setLanguage('fr')">FR</button>
      <button class="lang-btn active" id="btn-en" onclick="setLanguage('en')">EN</button>
    </div>
  </div>
  <p class="subtitle" id="subtitle"></p>

  <!-- Capture -->
  <div class="capture-row">
    <button class="capture-btn" onclick="document.getElementById('cameraInput').click()">
      <span class="ico">📷</span><span id="cap-photo"></span>
    </button>
    <button class="capture-btn" onclick="document.getElementById('fileInput').click()">
      <span class="ico">🖼️</span><span id="cap-import"></span>
    </button>
  </div>

  <!-- Zone aperçu -->
  <div id="dropZone" class="upload-zone" style="display:none" onclick="document.getElementById('fileInput').click()">
    <img id="previewImg" alt="Aperçu" />
  </div>
  <p id="changeLink" class="change-link" style="display:none" onclick="document.getElementById('fileInput').click()">
    🔄 <span id="change-text"></span>
  </p>

  <!-- caméra arrière mobile -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" />
  <input type="file" id="fileInput" accept="image/*" style="display:none" />

  <!-- Conseils de prise de vue -->
  <div class="tips-box">
    <div class="tips-title" id="tips-title"></div>
    <ul class="tips-list" id="tips-list"></ul>
  </div>

  <!-- Question libre -->
  <label for="questionInput" id="question-label"></label>
  <textarea id="questionInput"></textarea>

  <!-- Paramètres -->
  <div class="params-box">
    <div class="params-title" id="params-title"></div>
    <div class="params-grid">
      <div>
        <label id="label-slope"></label>
        <input type="number" id="slope" value="0.026" step="0.001" min="0.001" />
        <p class="param-hint" id="hint-slope"></p>
      </div>
      <div>
        <label id="label-face-factor"></label>
        <input type="number" id="faceFactor" value="2.0" step="0.1" min="1.0" max="5.0" />
        <p class="param-hint" id="hint-face-factor"></p>
      </div>
      <div>
        <label id="label-density"></label>
        <input type="number" id="plantDensity" value="150000" step="1000" min="1000" />
        <p class="param-hint" id="hint-density"></p>
      </div>
    </div>
    <div class="warning-box" id="warning-box"></div>
  </div>

  <!-- Bouton principal -->
  <button class="primary" id="detectBtn" onclick="detectYolo()" disabled>🎯 <span id="detect-text"></span></button>

  <!-- Traitement par lot -->
  <div class="params-box" style="margin-top:16px;">
    <div class="params-title" id="batch-title"></div>
    <p style="font-size:12.5px; color:var(--muted); margin-bottom:10px;" id="batch-hint"></p>
    <input type="file" id="batchInput" accept="image/*" multiple style="display:none" />
    <button class="primary" style="background:#2e7d32;" onclick="document.getElementById('batchInput').click()">
      📂 <span id="batch-select"></span>
    </button>
    <div id="batchStatus" style="font-size:13px; color:var(--muted); margin-top:10px;"></div>
    <div id="batchResult" style="margin-top:12px;"></div>
  </div>

  <!-- Résultat -->
  <div class="result" id="result">
    <div class="result-title" id="resultLabel"></div>
    <div id="resultContent"></div>
  </div>

</div>
<script>
  let imageBase64 = null;
  let imageType   = 'image/jpeg';
  let currentLang = 'en';

  const translations = {
    fr: {
      subtitle:      'Estimation des traits du sorgho à partir de photos prises au téléphone — détection de grains par YOLOv11 + analyse agronomique locale.',
      capPhoto:      'Prendre une photo',
      capImport:     'Importer',
      changeText:    'Changer l\'image',
      questionLabel: 'Question agronomique (optionnel)',
      placeholder:   'Ex : la panicule présente-t-elle des zones vides ou des grains de taille irrégulière ?',
      detectText:    'Détecter & estimer',
      yoloLabel:     '🎯 Détection — Sorgho',
      claudeLoading: '🌾 Analyse agronomique en cours...',
      grainsLabel:   'GRAINS DÉTECTÉS',
      massLabel:     'MASSE ESTIMÉE',
      confLabel:     'CONFIANCE MOY.',
      yieldLabel:    'RENDEMENT EST.',
      paramsTitle:   'Paramètres d\'estimation',
      labelSlope:    'Slope (g/grain)',
      hintSlope:     'Poids moyen par grain',
      labelFace:     'Facteur face',
      hintFace:      'Correction face visible (pas encore calibré)',
      labelDensity:  'Densité (plants/ha)',
      hintDensity:   'Densité réelle de ton essai',
      warningBox:    '⚠️ Facteur face = 2.0 par défaut. Le modèle ne détecte qu\'une face de la panicule. Mets à jour cette valeur quand tu auras des comptages manuels pour calibration.',
      formulaLabel:  'Formule utilisée',
      faceWarning:   'valeur par défaut — calibration manuelle recommandée',
      tipsTitle:     'Conseils de prise de vue',
      batchTitle:    'Traitement par lot',
      batchHint:     'Sélectionne plusieurs images : chaque image est analysée, puis un CSV est généré (nom de l\'image = identifiant, + nombre de grains, masse estimée, confiance…).',
      batchSelect:   'Choisir plusieurs images',
      batchDownload: '⬇️ Télécharger le CSV',
      batchProcessing: 'Traitement en cours',
      batchDone:     'Lot terminé',
      tips: [
        'Étale les grains / cadre la panicule sans chevauchement important',
        'Utilise un fond uni et contrasté',
        'Évite les ombres fortes et les reflets',
        'Tiens le téléphone parallèle au support',
        'Cadre l\'ensemble des grains, lumière homogène'
      ]
    },
    en: {
      subtitle:      'Sorghum trait estimation from phone photos — grain detection by YOLOv11 + local agronomic analysis.',
      capPhoto:      'Take a photo',
      capImport:     'Import',
      changeText:    'Change image',
      questionLabel: 'Agronomic question (optional)',
      placeholder:   'e.g. Does the panicle show empty zones or irregular grain sizes?',
      detectText:    'Detect & estimate',
      yoloLabel:     '🎯 Detection — Sorghum',
      claudeLoading: '🌾 Agronomic analysis in progress...',
      grainsLabel:   'GRAINS DETECTED',
      massLabel:     'ESTIMATED MASS',
      confLabel:     'MEAN CONFIDENCE',
      yieldLabel:    'EST. YIELD',
      paramsTitle:   'Estimation parameters',
      labelSlope:    'Slope (g/grain)',
      hintSlope:     'Average weight per grain',
      labelFace:     'Face factor',
      hintFace:      'Visible face correction (not yet calibrated)',
      labelDensity:  'Density (plants/ha)',
      hintDensity:   'Actual density of your trial',
      warningBox:    '⚠️ Face factor = 2.0 by default. The model detects only one face of the panicle. Update this value once you have manual grain counts for calibration.',
      formulaLabel:  'Formula used',
      faceWarning:   'default value — manual calibration recommended',
      tipsTitle:     'Shooting tips',
      batchTitle:    'Batch processing',
      batchHint:     'Select multiple images: each one is analyzed, then a CSV is generated (image name = ID, + grain count, estimated mass, confidence…).',
      batchSelect:   'Choose multiple images',
      batchDownload: '⬇️ Download CSV',
      batchProcessing: 'Processing',
      batchDone:     'Batch complete',
      tips: [
        'Spread grains / frame the panicle without heavy overlap',
        'Use a plain, contrasting background',
        'Avoid strong shadows and glare',
        'Hold the phone parallel to the surface',
        'Frame all grains, even lighting'
      ]
    }
  };

  function setLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.getElementById('subtitle').textContent       = t.subtitle;
    document.getElementById('cap-photo').textContent      = t.capPhoto;
    document.getElementById('cap-import').textContent     = t.capImport;
    document.getElementById('change-text').textContent    = t.changeText;
    document.getElementById('question-label').textContent = t.questionLabel;
    document.getElementById('questionInput').placeholder  = t.placeholder;
    document.getElementById('detect-text').textContent    = t.detectText;
    document.getElementById('params-title').textContent   = t.paramsTitle;
    document.getElementById('label-slope').textContent    = t.labelSlope;
    document.getElementById('hint-slope').textContent     = t.hintSlope;
    document.getElementById('label-face-factor').textContent = t.labelFace;
    document.getElementById('hint-face-factor').textContent  = t.hintFace;
    document.getElementById('label-density').textContent  = t.labelDensity;
    document.getElementById('hint-density').textContent   = t.hintDensity;
    document.getElementById('warning-box').textContent    = t.warningBox;
    document.getElementById('tips-title').textContent     = t.tipsTitle;
    document.getElementById('batch-title').textContent    = t.batchTitle;
    document.getElementById('batch-hint').textContent     = t.batchHint;
    document.getElementById('batch-select').textContent   = t.batchSelect;
    const tl = document.getElementById('tips-list');
    tl.innerHTML = '';
    t.tips.forEach(tip => { const li = document.createElement('li'); li.textContent = tip; tl.appendChild(li); });
    document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  }

  setLanguage('en');

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = new Image();
      img.onload = function() {
        const maxWidth = 1500;
        let width = img.width, height = img.height;
        if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const compressed = canvas.toDataURL('image/jpeg', 0.85);
        imageBase64 = compressed.split(',')[1];
        imageType   = 'image/jpeg';
        document.getElementById('previewImg').src           = compressed;
        document.getElementById('dropZone').style.display   = 'block';
        document.getElementById('changeLink').style.display = 'block';
        document.getElementById('detectBtn').disabled       = false;
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));
  document.getElementById('cameraInput').addEventListener('change', e => handleFile(e.target.files[0]));

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => e.preventDefault());
  dz.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  // ─── Traitement par lot ───────────────────────────────────────────────────
  let lastCsv = null;

  function readImageResized(file, maxWidth = 1500) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const b64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
          resolve({ name: file.name, data: b64 });
        };
        img.onerror = reject;
        img.src = ev.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('batchInput').addEventListener('change', async e => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    const t = translations[currentLang];
    const statusEl = document.getElementById('batchStatus');
    const resultEl = document.getElementById('batchResult');
    resultEl.innerHTML = '';
    lastCsv = null;

    const slope      = parseFloat(document.getElementById('slope').value)      || 0.026;
    const faceFactor = parseFloat(document.getElementById('faceFactor').value) || 2.0;

    // Préparation des images (redimensionnées)
    statusEl.textContent = `${t.batchProcessing} — 0/${files.length}`;
    const images = [];
    for (let i = 0; i < files.length; i++) {
      try {
        images.push(await readImageResized(files[i]));
      } catch (err) {
        images.push({ name: files[i].name, data: null });
      }
      statusEl.textContent = `${t.batchProcessing} — ${i + 1}/${files.length}`;
    }

    statusEl.innerHTML = `<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;

    try {
      const res = await fetch('/detect-batch', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images, conf: 0.25, max_det: 10000, slope, face_factor: faceFactor })
      });
      const data = await res.json();
      if (!data.success) {
        statusEl.innerHTML = '<span class="error-text">❌ ' + (data.error || 'erreur') + '</span>';
        return;
      }
      lastCsv = data.csv;
      statusEl.textContent = `${t.batchDone} — ${data.rows.length} image(s)`;

      // Tableau récapitulatif
      let html = '<div style="overflow-x:auto;"><table class="result-text" style="width:100%; font-size:12.5px;">';
      html += '<tr><th>Image</th><th>Grains</th><th>Total</th><th>Masse (g)</th><th>Conf.</th></tr>';
      for (const r of data.rows) {
        const conf = r.status.startsWith('error') ? r.status : (r.conf_mean * 100).toFixed(1) + '%';
        html += `<tr><td>${r.image_id}</td><td>${r.count}</td><td>${r.grains_total}</td><td>${r.mass_g}</td><td>${conf}</td></tr>`;
      }
      html += '</table></div>';
      html += `<button class="primary" style="margin-top:12px; background:#1b5e20;" onclick="downloadCsv()">${t.batchDownload}</button>`;
      resultEl.innerHTML = html;

    } catch (err) {
      statusEl.innerHTML = '<span class="error-text">❌ ' + err.message + '</span>';
    }

    e.target.value = '';  // permet de re-sélectionner le même lot
  });

  function downloadCsv() {
    if (!lastCsv) return;
    const blob = new Blob([lastCsv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const ts   = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
    a.href = url; a.download = `breedlens_batch_${ts}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  window.downloadCsv = downloadCsv;

  async function detectYolo() {
    if (!imageBase64) return;
    const btn = document.getElementById('detectBtn');
    btn.disabled = true;
    const t            = translations[currentLang];
    const slope        = parseFloat(document.getElementById('slope').value)      || 0.026;
    const faceFactor   = parseFloat(document.getElementById('faceFactor').value) || 2.0;
    const plantDensity = parseInt(document.getElementById('plantDensity').value) || 150000;
    const result  = document.getElementById('result');
    const content = document.getElementById('resultContent');
    document.getElementById('resultLabel').textContent = t.yoloLabel;
    result.style.display = 'block';
    content.innerHTML = '<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    try {
      const yoloRes = await fetch('/detect', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imageBase64, imageType, conf: 0.25, max_det: 10000, slope })
      });
      const yolo = await yoloRes.json();
      if (!yolo.success) {
        content.innerHTML = '<p class="error-text">❌ ' + yolo.error + '</p>';
        btn.disabled = false; return;
      }
      const count       = yolo.count     ?? 0;
      const conf_mean   = yolo.conf_mean ?? 0;
      const grainsTotal = Math.round(count * faceFactor);
      const massTotal_g = parseFloat((grainsTotal * slope).toFixed(2));
      const yield_kg_ha = parseFloat((grainsTotal * slope * plantDensity / 1000).toFixed(1));
      const yield_t_ha  = parseFloat((yield_kg_ha / 1000).toFixed(3));

      content.innerHTML = `
        <img src="data:image/jpeg;base64,${yolo.annotated_image}"
          style="width:100%; max-height:600px; object-fit:contain; border-radius:10px;
                 border:1px solid var(--line); background:#0c120e; margin-bottom:16px;" />
        <div class="stats-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:12px;">
          <div style="background:var(--green-bg); border-radius:10px; padding:12px; text-align:center;">
            <div style="font-size:11px; color:var(--muted); margin-bottom:4px;">${t.grainsLabel}</div>
            <div style="font-size:22px; font-weight:600; color:var(--green-soft);">${count.toLocaleString()}</div>
            <div style="font-size:10px; color:#9aa89a; margin-top:2px;">visible face</div>
          </div>
          <div style="background:#e8f0fe; border-radius:10px; padding:12px; text-align:center;">
            <div style="font-size:11px; color:var(--muted); margin-bottom:4px;">${t.massLabel}</div>
            <div style="font-size:22px; font-weight:600; color:#1a73e8;">${massTotal_g} g</div>
            <div style="font-size:10px; color:#9aa89a; margin-top:2px;">× ${faceFactor}</div>
          </div>
          <div style="background:#fff8e1; border-radius:10px; padding:12px; text-align:center;">
            <div style="font-size:11px; color:var(--muted); margin-bottom:4px;">${t.confLabel}</div>
            <div style="font-size:22px; font-weight:600; color:#f57c00;">${(conf_mean * 100).toFixed(1)}%</div>
            <div style="font-size:10px; color:#9aa89a; margin-top:2px;">YOLOv11</div>
          </div>
          <div style="background:#f3e5f5; border-radius:10px; padding:12px; text-align:center;">
            <div style="font-size:11px; color:var(--muted); margin-bottom:4px;">${t.yieldLabel}</div>
            <div style="font-size:22px; font-weight:600; color:#7b1fa2;">${yield_t_ha} t/ha</div>
            <div style="font-size:10px; color:#9aa89a; margin-top:2px;">${plantDensity.toLocaleString()} pl/ha</div>
          </div>
        </div>
        <div style="background:#f8faf8; border-radius:8px; padding:10px 14px; font-size:12px; color:var(--muted); margin-bottom:16px; line-height:1.7;">
          <strong>📐 ${t.formulaLabel} :</strong><br>
          ${count} grains × ${faceFactor} (face) × ${slope} g/grain × ${plantDensity.toLocaleString()} pl/ha
          = <strong>${yield_kg_ha} kg/ha = ${yield_t_ha} t/ha</strong><br>
          <span style="color:#e65100; font-size:11px;">⚠️ Facteur face = ${faceFactor} (${t.faceWarning})</span>
        </div>
        <div id="claudeAnalysis">
          <div style="font-size:13px; font-weight:500; color:var(--muted); margin-bottom:8px;">${t.claudeLoading}</div>
          <div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>`;

      const claudeRes = await fetch('/analyze-sorghum', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          annotatedImage: yolo.annotated_image,
          count, grains_total: grainsTotal, mass_g: massTotal_g,
          conf_mean, slope_used: slope, face_factor: faceFactor,
          plant_density: plantDensity, yield_t_ha,
          class_counts: yolo.class_counts, lang: currentLang
        })
      });
      const reader  = claudeRes.body.getReader();
      const decoder = new TextDecoder();
      let fullText  = '';
      document.getElementById('claudeAnalysis').innerHTML = '<div class="result-text" id="claudeStream"></div>';
      const streamEl = document.getElementById('claudeStream');
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of decoder.decode(value).split('\n')) {
          if (line.startsWith('data: ')) {
            const d = line.slice(6);
            if (d === '[DONE]') continue;
            try { const p = JSON.parse(d); if (p.text) { fullText += p.text; streamEl.innerHTML = marked.parse(fullText); } } catch(e) {}
          }
        }
      }
    } catch (err) { content.innerHTML = '<p class="error-text">❌ ' + err.message + '</p>'; }
    btn.disabled = false;
  }
</script>
</body>
</html>
